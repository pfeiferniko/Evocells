<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolutions-Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
    <div id="controls-bar">
        <button id="fullscreen-btn">Vollbild</button>
        <button id="mode-btn">Ansicht: 2D</button>
        <button id="reset-btn" style="color: #ff5555;">Neustart</button>
    </div>

    <canvas id="canvas2D" width="2000" height="1000"></canvas>
    <canvas id="canvas3D" width="2000" height="1000" style="display: none;"></canvas>
    <canvas id="uiCanvas" width="2000" height="1000"></canvas>

    <div id="bottom-bar">
        <button id="fps-btn">FPS: AN</button>
        <button id="pixel-btn">Pixel: AUS</button>
        <button id="debug-btn">Debug: AN</button>
        <button id="impressum-btn">Impressum</button>
    </div>
</div>

<div id="impressum-modal" class="hidden">
    <div class="modal-content">
        <span id="close-btn">&times;</span>
        <h2>Impressum</h2>
        <p>Angaben gemäß § 5 DDG</p>
        <p>
            <strong>Niko Pfeifer</strong><br>
            Brandaustraße 29<br>
            12277 Berlin
        </p>
        <h3>Kontakt</h3>
        <p>
            Telefon: +49 (0) 171 2188051<br>
            E-Mail: pfeifer.niko@gmail.com
        </p>
    </div>
</div>

<div id="restart-modal" class="hidden">
    <div class="modal-content">
        <h2>Simulation Neustarten</h2>
        <p>Wie soll die neue Welt aussehen?</p>
        <div class="restart-options">
            <button id="reset-full-btn" class="menu-btn primary">Gefüllte Welt</button>
            <button id="reset-empty-btn" class="menu-btn">Leere Welt (Sandbox)</button>
            <button id="reset-cancel-btn" class="menu-btn cancel">Abbrechen</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script defer src="js/settings.js"></script>
<script defer src="js/grid.js"></script>

<script defer src="js/cell.js"></script>
<script defer src="js/animal.js"></script>
<script defer src="js/herbivore.js"></script>
<script defer src="js/carnivore.js"></script>
<script defer src="js/snake.js"></script>

<script defer src="js/draw.js"></script>
<script defer src="js/draw3d.js"></script>

<script defer src="js/shop.js"></script>
<script defer src="js/main.js"></script>
</body>
</html>
